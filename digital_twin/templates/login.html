<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalTwinGPS Sign In</title>
    <meta name="description" content="Sign in to the DigitalTwinGPS route telemetry console.">
    <style>
        :root {
            --bg: #101113;
            --panel: #181a1d;
            --line: #2c3035;
            --text: #f2f0eb;
            --muted: #9c9991;
            --accent: #d09a44;
            --red: #d7665f;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            background:
                linear-gradient(rgba(255, 255, 255, .025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px),
                var(--bg);
            background-size: 28px 28px;
            color: var(--text);
            font-family: Aptos, "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
        }
        main {
            width: min(420px, calc(100vw - 32px));
            padding: 30px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 22px 60px rgba(0, 0, 0, .32);
        }
        h1 { margin: 0 0 8px; font-size: 24px; letter-spacing: -.01em; line-height: 1; }
        p { margin: 0 0 22px; color: var(--muted); line-height: 1.6; font-size: 14px; }
        label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 13px; }
        input {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #111315;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(208, 154, 68, .18); }
        button {
            width: 100%;
            height: 42px;
            margin-top: 16px;
            border: 0;
            border-radius: 6px;
            background: var(--accent);
            color: #17110a;
            font-weight: 750;
            cursor: pointer;
            transition: transform .16s ease, filter .16s ease;
        }
        button:hover { filter: brightness(1.04); }
        button:active { transform: translateY(1px); }
        button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
        .error {
            margin-top: 14px;
            color: var(--red);
            font-size: 13px;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <main>
        <h1>DigitalTwinGPS</h1>
        <p>Enter the API secret from your local environment to open the route console.</p>
        <form method="post" action="/login">
            <label for="api_key">API Key</label>
            <input id="api_key" name="api_key" type="password" autocomplete="current-password" required autofocus>
            <button type="submit">Sign In</button>
            <div class="error">{{ error }}</div>
        </form>
    </main>
</body>
</html>
