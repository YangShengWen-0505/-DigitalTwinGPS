<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalTwinGPS Sign In</title>
    <style>
        :root {
            --bg: #090b0f;
            --panel: rgba(28, 30, 35, .92);
            --line: rgba(255, 255, 255, .1);
            --text: #f5f5f7;
            --muted: #9a9aa0;
            --blue: #0a84ff;
            --red: #ff453a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 50% 0%, #1d2633 0, var(--bg) 45%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        main {
            width: min(420px, calc(100vw - 32px));
            padding: 28px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, .35);
        }
        h1 { margin: 0 0 8px; font-size: 22px; letter-spacing: 0; }
        p { margin: 0 0 22px; color: var(--muted); line-height: 1.6; font-size: 14px; }
        label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 13px; }
        input {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(0, 0, 0, .28);
            color: var(--text);
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: rgba(10, 132, 255, .75); }
        button {
            width: 100%;
            height: 42px;
            margin-top: 16px;
            border: 0;
            border-radius: 8px;
            background: var(--blue);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .error {
            margin-top: 14px;
            color: var(--red);
            font-size: 13px;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <main>
        <h1>DigitalTwinGPS</h1>
        <p>Enter the API_SECRET_KEY from your .env file to open the dashboard.</p>
        <form method="post" action="/login">
            <label for="api_key">API Key</label>
            <input id="api_key" name="api_key" type="password" autocomplete="current-password" required autofocus>
            <button type="submit">Sign In</button>
            <div class="error">{{ error }}</div>
        </form>
    </main>
</body>
</html>
